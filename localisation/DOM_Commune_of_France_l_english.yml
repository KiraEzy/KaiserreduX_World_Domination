#KXWD_GRE_coring_time_desc:0 "Spending time and money will be key to win our subjects' trust."

### Events ###
KXWD_FRA.1.t:0 "Victory of Société Impériale Révolutionnaire Française"
KXWD_FRA.1.d:0 "For a long time we have been living in the shadows but now with the rise of those crazed sorelians and their syndicalist imperialism we were able to rise from those shadows. Now we will create a true syndicalist empire not any sorelianist slop but a monarchy from the workers and soldiers to the workers and soldiers. and we even have the monarch for the job from the greatest of the french houses. Louis Napoleon Bonaparte IV a supporter of democracy, welfare and the workers and with some concessions he will probably agree to rule France, mainly with the fact that the illegitimate government in Algiers is ruled by radicals who hate democracy and by extension France itself."
KXWD_FRA.1.a:0 "At last the world shall see us."
KXWD_FRA.2.t:0 "The Grand Coronation"
KXWD_FRA.2.d:0 "Now with the negotiations with Napoleon complete, we can witness the greatest coronation in the world, with not aristocracy but with workers invited to see it, Emperor Napoleon VI of France was crowned and alongside our prime minister started ruling the true France with a goal to liberate the people stuck in Algiers from the radicals."
KXWD_FRA.2.a:0 "All hail the emperor, all hail the workers!"
