KXWD_FRA_faction:0 "Alliance Impériale Révolutionnaire Internationale"
KXWD_POLITICS_BONAPARTE:0 "Born in 1914 in exile, along with his entire family since the fall of the Second Empire, Louis-Napoléon Bonaparte had known nothing but flight since his earliest days. Born in Belgium his family fled to England shortly after he was born, then fled to Switzerland after England fell to the fires of Syndicalist tyranny. When he was old enough, inspired to a devoted love of a home country he had not even seen much less lived in, Louis Napoléon joined the Foreign Legion under the false identity of Louis Blanchard. However, being the head of the Bonaparte family since 1926 had brought him a certain degree of notoriety so it was not long before many within National France recognized this new Blanchard for who he really was. While the French government initially intended to drum him out of the Legion and into exile, with some ministers even wanting to classify him an enemy of the state, he quickly gained fame as a war hero. His unit was involved with many dangerous missions against native rebels in the Sahara and Louis distinguished himself multiple times through his actions taking no less than five wounds. With a few more medals pinned to his chest and having bled for France more readily than most others, the government soon found their hands tied.\n\nAfterwards he began to, according to him unintentionally, inflame the seemingly dead Bonapartist movement in the French Right. While the AF wanted a stuffy aristocrat to be a stuffy aristocratic King, the Bonapartists championed Louis as a true heir to Napoléon The Great, a war hero and man of the people."




