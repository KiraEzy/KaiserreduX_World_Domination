KXWD_POL_end_of_poland_desc:0 "The end of Poland has come. the German eagle has atacked!"
KXWD_POL_partisans_desc:0 "The partisans have formed and are ready to fight the Germans."
KXWD_POL_reserves_desc:0 "We were forced to rapidly call up reservists to come and fight the Germans."
KXWD_POL_weaken_germany_desc:0 "We will sent agitators into german occupied poland and weaken them and their pride."
KXWD_POL_victory_desc:0 "Victory! The Germans have asked for peace! Poland Lives on!"
KXWD_POL_not_yet_dead_desc:0 "With the German yoke backing down it is clear than the dream of free Polska lives on."
KXWD_POL_rise_of_poland_desc:0 "This century shall not be the German nor Russian, not even French, it shall be Polish"
KXWD_POL_for_glory_desc:0 "We will fight for the glory of Poland, for the righteous cause of Poland and for the freedom of Poland"
KXWD_POL_commonwealth_army_desc:0 "Now with the Commonwealth united we must reform our army to its standards"
KXWD_POL_towards_greater_poland_desc:0 "We will work towards making a great Poland"
KXWD_POL_operation_our_brothers_desc:0 "Operation Nasi Bracia is a go. We will reclaim Galicia"
KXWD_POL_operation_commonwealth_desc:0 "Operation Wspólnota is a go. We will reclaim Lithuania"
KXWD_POL_commonwealth_united_desc:0 "Now that we control Lithuania and Galicia it has come time to proclaim the Commonwealth"
KXWD_POL_intermarium_dream_desc:0 "We must strive for a greater state not just the commonwealth but Intermarium. We shall stake our claim to intermarium and unite the people againts russia, germany and any other agressor"
KXWD_POL_intermarium_army_desc:0 "We will reform the army to support the intermarian dream and the many cultures within it"
KXWD_POL_culture_question_desc:0 "Today we must answer the question of intermarian culture, will it be polish or multicultural"
KXWD_POL_admin_dilemma_desc:0 "Administration must be reformed to fit the intermarian dream"
KXWD_POL_industry_direction_desc:0 "We must choose where our industry will specialize"
KXWD_POL_recruit_generals_desc:0 "The king must decide about what to do with foreing generals"
KXWD_POL_intermarium_united_desc:0 "At last we are one nation. Intermarium Forever"

