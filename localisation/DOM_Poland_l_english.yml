####### events #######

KXWD_POL.1:0 "The End is Here"
KXWD_POL.1.t:0 "The End is Here"
KXWD_POL.1.d:0 "The Germans have declared war on us because of our declaration of independence. We are much weaker then them and no doubt the ukrainians are going to join them to take chelm. This might trully be the end of Poland"
KXWD_POL.1.a:0 "Till the Bitter End"
KXWD_POL.2:0 "Peace with Germany"
KXWD_POL.2.t:0 "Peace with Germany"
KXWD_POL.2.d:0 "We held for long and proven that we are not to be played with, and so germany is asking for peace."
KXWD_POL.2.a:0 "Victory at last!"
KXWD_POL.3:0 "Administrative Dilemma"
KXWD_POL.3.t:0 "Administrative Dilemma"
KXWD_POL.3.d:0 "Now that we have proclaimed the Intermarium we must decide about how we are going to administer it"
KXWD_POL.3.a:0 "Centralised Commonwealth Administration"
KXWD_POL.3.b:0 "Autonomous Commonwealth Administration"
KXWD_POL.4:0 "Cultural Question"
KXWD_POL.4.t:0 "Cultural Question"
KXWD_POL.4.d:0 "Now that we have proclaimed the Intermarium we must decide about how we are going to treat other cultures in it"
KXWD_POL.4.a:0 "Full Cultural Integration"
KXWD_POL.4.b:0 "Religious and Cultural Autonomy"
KXWD_POL.5:0 "Industrial Direction"
KXWD_POL.5.t:0 "Industrial Direction"
KXWD_POL.5.d:0 "Now that we have proclaimed the Intermarium we must decide about our industrial direction"
KXWD_POL.5.a:0 "Civilian Focus"
KXWD_POL.5.b:0 "Military Focus"
KXWD_POL.5.c:0 "Resource Extraction Focus"
KXWD_POL.6:0 "The Fate of Foreign Generals"
KXWD_POL.6.t:0 "The Fate of Foreign Generals"
KXWD_POL.6.d:0 "Now that we have proclaimed the Intermarium we must decide about what we are going to do with foreing Generals"
KXWD_POL.6.a:0 "Recruit Them"
KXWD_POL.6.b:0 "Forget them"

