 KXWD_BEL_wallonia_map_tt:0 "§YWallonia§! / whole-country strip: §Oorange§!–§Yyellow§! = §ODutch§! lean, §Wwhite§! = neutral, §Hkhaki§!–§gcharcoal§! = §gGerman§! lean."
