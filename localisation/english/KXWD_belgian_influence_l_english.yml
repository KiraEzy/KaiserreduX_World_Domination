l_english:
 KXWD_belgian_influence_struggle:0 "The Belgian Frontier Contest"
 KXWD_belgian_influence_struggle_desc:0 "§YBelgium§! has become a quiet battlefield of money, newspapers, and patrons. In §YFlanders§! and §YWallonia§!, agents of the §ONetherlands§! and the §gGerman Empire§! compete for factories, parties, and public opinion while Brussels pretends neutrality.\n\nEach region drifts between §Ostrong Dutch alignment§!, a §Wbalanced§! posture, and §gstrong German alignment§!. The map colours track that contest; use decisions to pull either region toward The Hague or Berlin."

 KXWD_belgian_influence_gui_intro:0 "§YBelgium§! sits between §ODutch§! mercantile networks and §gReich§! industry. §YFlanders§! feels §OAmsterdam’s§! pull; §YWallonia§! weighs §gRuhr§! capital and §gPrussian§! order. Rival missions, subsidies, and press campaigns shift local élites—sometimes a little, sometimes decisively."

