 KXWD_BEL_wallonia_prep_gain_tt:0 "§YWallonia§! preparation increased by §G1§!."
 KXWD_BEL_influence_countdown_210_days:0 "Belgian Influence Deadline (210 Days)"
 KXWD_BEL_influence_countdown_210_days_desc:0 "Run the long game: when this countdown ends, the Belgian influence contest enters final adjudication."
 KXWD_BEL_resolve_influence_situation:0 "Resolve Belgian Influence Situation"
 KXWD_BEL_resolve_influence_situation_desc:0 "Review Flanders and Wallonia separately, then enforce the final territorial and political outcome."

