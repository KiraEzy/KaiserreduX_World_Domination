 KXWD_BEL_flanders_prep_1_fund_friendly_newspapers:0 "Fund Friendly Newspapers"
 KXWD_BEL_flanders_prep_1_fund_friendly_newspapers_desc:0 "Place reliable editors and subsidize compliant print shops before any open escalation.\n\n§GWhen completed:§! Gain §Y50§! Political Power."
 KXWD_BEL_flanders_prep_2_bribe_municipal_elites:0 "Bribe Municipal Elites"
 KXWD_BEL_flanders_prep_2_bribe_municipal_elites_desc:0 "Secure town notables and district brokers who can quietly steer appointments and contracts.\n\n§GWhen completed:§! Gain §Y2%§! popularity for the ruling party."
 KXWD_BEL_flanders_prep_3_support_trade_leagues:0 "Support Trade Leagues and Factory Owners"
 KXWD_BEL_flanders_prep_3_support_trade_leagues_desc:0 "Tie influence to livelihoods by backing guild boards and key industrial patrons. Costs §Y120§! Political Power.\n\n§GWhen completed:§! Gain §Y1§! off-map Military Factory."
 KXWD_BEL_flanders_prep_4_sponsor_language_leagues:0 "Sponsor Flemish Language Leagues"
 KXWD_BEL_flanders_prep_4_sponsor_language_leagues_desc:0 "Channel grants into cultural associations that shape local identity and political preference.\n\n§GWhen completed:§! Gain §Y2%§! Stability."
 KXWD_BEL_flanders_prep_5_subsidize_newspapers:0 "Subsidize Dutch-Leaning Newspapers"
 KXWD_BEL_flanders_prep_5_subsidize_newspapers_desc:0 "Expand distribution and credit lines for papers favorable to Dutch alignment.\n\n§GWhen completed:§! Gain §Y2%§! War Support."
 KXWD_BEL_flanders_prep_6_court_industrialists:0 "Court Port and Textile Industrialists"
 KXWD_BEL_flanders_prep_6_court_industrialists_desc:0 "Broker preferential terms with dock and mill magnates to gain leverage over municipal politics. Costs §Y130§! Political Power.\n\n§GWhen completed:§! Gain §Y1§! off-map Civilian Factory."
 KXWD_BEL_flanders_prep_7_student_clergy_networks:0 "Organize Student and Clergy Patronage Networks"
 KXWD_BEL_flanders_prep_7_student_clergy_networks_desc:0 "Build dependable intermediaries in universities and parishes for long-tail influence.\n\n§GWhen completed:§! Gain §Y1000§! Manpower."

 KXWD_BEL_wallonia_prep_1_language_societies:0 "Back Language Societies or Cultural Clubs"
 KXWD_BEL_wallonia_prep_1_language_societies_desc:0 "Support associations that can normalize our preferred public narrative.\n\n§GWhen completed:§! Gain §Y2%§! Stability."
 KXWD_BEL_wallonia_prep_2_discredit_rivals:0 "Discredit Rival Patrons"
 KXWD_BEL_wallonia_prep_2_discredit_rivals_desc:0 "Leak audits and scandals to weaken opposing financiers and their local brokers.\n\n§GWhen completed:§! Gain §Y50§! Political Power."
 KXWD_BEL_wallonia_prep_3_smuggle_campaign_money:0 "Smuggle Campaign Money Across the Border"
 KXWD_BEL_wallonia_prep_3_smuggle_campaign_money_desc:0 "Create covert channels for campaign funds before formal pressure begins.\n\n§GWhen completed:§! Gain §Y2%§! popularity for the ruling party."
 KXWD_BEL_wallonia_prep_4_business_circles:0 "Buy Influence in Business Circles First"
 KXWD_BEL_wallonia_prep_4_business_circles_desc:0 "Target chambers of commerce and procurement committees to lock in commercial support.\n\n§GWhen completed:§! Gain §Y2%§! War Support."
 KXWD_BEL_wallonia_prep_5_press_networks:0 "Penetrate Local Press Networks"
 KXWD_BEL_wallonia_prep_5_press_networks_desc:0 "Place friendly staff and ad contracts across provincial media outlets.\n\n§GWhen completed:§! Gain §Y1000§! Manpower."
 KXWD_BEL_wallonia_prep_6_undermine_german_investors:0 "Undermine German-Backed Investors"
 KXWD_BEL_wallonia_prep_6_undermine_german_investors_desc:0 "Disrupt competitor credit structures and acquisition plans before the final push. Costs §Y120§! Political Power.\n\n§GWhen completed:§! Gain §Y1§! off-map Military Factory."
 KXWD_BEL_wallonia_prep_7_final_prep_lobby:0 "Build Final Lobbying Bloc"
 KXWD_BEL_wallonia_prep_7_final_prep_lobby_desc:0 "Only after groundwork is complete can a weaker but decisive influence push be attempted. Costs §Y130§! Political Power.\n\n§GWhen completed:§! Gain §Y1§! off-map Civilian Factory."

 KXWD_BEL_influence_nudge_flanders_dutch:0 "Promote §ODutch§! Narratives in Flanders"
 KXWD_BEL_influence_nudge_flanders_dutch_desc:0 "Spend political capital to pull §YFlanders§! one step toward the §ONetherlands§! (frames §R1–2§!)."
 KXWD_BEL_influence_nudge_flanders_dutch_tt:0 "§YFlanders§! shifts one step toward §ODutch§! alignment."

 KXWD_BEL_influence_nudge_flanders_german:0 "Promote Reich Sympathies in Flanders"
 KXWD_BEL_influence_nudge_flanders_german_desc:0 "Spend political capital to pull §YFlanders§! one step toward the §gGerman Empire§! (frames §y4–5§!)."
 KXWD_BEL_influence_nudge_flanders_german_tt:0 "§YFlanders§! shifts one step toward §gGerman Empire§! alignment."

 KXWD_BEL_influence_nudge_wallonia_dutch:0 "Promote §ODutch§! Narratives in Wallonia"
 KXWD_BEL_influence_nudge_wallonia_dutch_desc:0 "Spend political capital to pull §YWallonia§! one step toward the §ONetherlands§! (frames §R1–2§!)."
 KXWD_BEL_influence_nudge_wallonia_dutch_tt:0 "§YWallonia§! shifts one step toward §ODutch§! alignment."

 KXWD_BEL_influence_nudge_wallonia_german:0 "Promote Reich Sympathies in Wallonia"
 KXWD_BEL_influence_nudge_wallonia_german_desc:0 "Spend political capital to pull §YWallonia§! one step toward the §gGerman Empire§! (frames §y4–5§!)."
 KXWD_BEL_influence_nudge_wallonia_german_tt:0 "§YWallonia§! shifts one step toward §gGerman Empire§! alignment."

 KXWD_BEL_influence.1.t:0 "Belgian Influence Deadline Reached"
 KXWD_BEL_influence.1.d:0 "The 210-day timetable has expired. The influence map now demands a formal settlement.\n\n§YFlanders:§! [GetKXWD_BEL_flanders_influence_status]\n§YWallonia:§! [GetKXWD_BEL_wallonia_influence_status]\n\nTake the §YResolve Belgian Influence Situation§! decision to apply the outcome."
 KXWD_BEL_influence.1.a:0 "Time to settle Belgium."

 KXWD_BEL_influence.2.t:0 "Belgian Influence Settlement"
 KXWD_BEL_influence.2.d:0 "The Belgian contest has been settled according to the latest regional alignment scores.\n\n§YFlanders:§! [GetKXWD_BEL_flanders_influence_status]\n§YWallonia:§! [GetKXWD_BEL_wallonia_influence_status]"
 KXWD_BEL_influence.2.a:0 "The map has been redrawn."
