### Events ###
KXWD_PRU.1:0 "Carlist Exiles Arive"
KXWD_PRU.1.t:0 "Carlist Exiles Arive"
KXWD_PRU.1.d:0 "We have invited the Carlist exiles and they accepted and now are arriving in Lima"
KXWD_PRU.1.a:0 "What could go Wrong"
KXWD_PRU.2:0 "Carlist Officers Coup the UR"
KXWD_PRU.2.t:0 "Carlist Officers Coup the UR"
KXWD_PRU.2.d:0 "The Carlists given too much power by UR have couped the government and declared the spanish government in exile"
KXWD_PRU.2.a:0 "Dios, Patria y Rey"
KXWD_PRU.3:0 "Peruvian Requetes Mobilize"
KXWD_PRU.3.t:0 "Peruvian Requetes Mobilize"
KXWD_PRU.3.d:0 "One of the first acts of the carlists is to create the peruvian Requetes, a militia force turned into profesional fighting force"
KXWD_PRU.3.a:0 "Into Battle"
KXWD_PRU.4:0 "Restauración"
KXWD_PRU.4.t:0 "Restauración"
KXWD_PRU.4.d:0 "The Carlists have decided to proclaim Francisco Javier de Borbon-Parma the king of Peru"
KXWD_PRU.4.a:0 "Javier Continues the carlist policy"
KXWD_PRU.4.b:0 "Javier Reconciles with the UR"
KXWD_PRU.4.c:0 "Javier Calls for pan-Hispanism"
KXWD_PRU.4.e:0 "Javier Embraces Integralism"
KXWD_PRU.5:0 "Coup in Bolivia"
KXWD_PRU.5.t:0 "Coup in Bolivia"
KXWD_PRU.5.d:0 "We have organized a coup in bolivia to strenghten our movement"
KXWD_PRU.5.a:0 "The Coup is Succesfull"
KXWD_PRU.6:0 "Hispanic Ambitions"
KXWD_PRU.6.t:0 "Hispanic Ambitions"
KXWD_PRU.6.d:0 "We will follow the hispanic ambitions and unite all hispanic and spanish people under the crown"
KXWD_PRU.6.a:0 "For a united Hispania"
KXWD_PRU.7:0 "War in the North"
KXWD_PRU.7.t:0 "War in the North"
KXWD_PRU.7.d:0 "We are going to war againts the northern states of colombia, venezuela and ecuador"
KXWD_PRU.7.a:0 "To War"
KXWD_PRU.8:0 "War in the South"
KXWD_PRU.8.t:0 "War in the South"
KXWD_PRU.8.d:0 "We are going to war againts the Southern states of Paraguay, Chile, Argentina and Uruguay"
KXWD_PRU.8.a:0 "To War"
KXWD_PRU.9:0 "Brazilian Menace"
KXWD_PRU.9.t:0 "Brazilian Menace"
KXWD_PRU.9.d:0 "We are going to war againts the Brazilian state"
KXWD_PRU.9.a:0 "To War"
KXWD_PRU.10:0 "Mexican Reconquest"
KXWD_PRU.10.t:0 "Mexican Reconquest"
KXWD_PRU.10.d:0 "We are going to war againts the Mexican state"
KXWD_PRU.10.a:0 "To War"
KXWD_PRU.11:0 "Destruction of the American Empire"
KXWD_PRU.11.t:0 "Destruction of the American Empire"
KXWD_PRU.11.d:0 "We are going to war againts the American Empire"
KXWD_PRU.11.a:0 "To War"
KXWD_PRU.12:0 "Return to the Mainland"
KXWD_PRU.12.t:0 "Return to the Mainland"
KXWD_PRU.12.d:0 "We are going to war againts the Spanish Communists to reclaim our home"
KXWD_PRU.12.a:0 "To War"

