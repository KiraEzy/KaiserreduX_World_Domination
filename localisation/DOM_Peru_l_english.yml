KXWD_PRU_Invite_Exiles_desc:0 "The Unión Revolucionaria has decided to invite the Carlist under the prospect that we will help them reclaim Spain if they swear loyalty to us."
KXWD_PRU_Carlist_Coup_desc:0 "In a suprising turn of events our leader has given many powers to the carlist as he sees them as great allies. What could go wrong?"
KXWD_PRU_Requetes_desc:0 "Now that the Carlist are in power they decided to recreate the Requetes, who once were a militia of the carlist but now they are being organized as a more profesional force."
KXWD_PRU_Clergy_desc:0 "The Carlists have many clergy contacts in the spanish mainland and are now inviting them to peru to support their new government."
KXWD_PRU_SH_desc:0 "The Carlist have created a secret police known as Santa Hermandad."
KXWD_PRU_Restoration_desc:0 "Now that the Carlist rule is secured. We will restore the carlist king. Javier I shall be crowned the King of the Carlist Kingdom in Exile."
KXWD_PRU_New_Kingdom_desc:0 "Now That we have proclaimed a new Kingdom we must propagandize it so that we gain legitimacy."
KXWD_PRU_Dios_Patria_Rey_desc:0 "Dios, Patria y Rey shall be our national Motto."
KXWD_PRU_Catholicism_desc:0 "We will mandate Catholicism everywhere. Madated church and church schools. For a pious nation."
KXWD_PRU_Reasonable_Populace_desc:0 "Our people should always guide themselves with reason and gods light."
KXWD_PRU_Enlightened_Populace_desc:0 "Our people will be trully enlightened with the preachings of the bible and with gods words."
KXWD_PRU_Traditions_desc:0 "We will instill the spanish traditions into the peruvian populace."
KXWD_PRU_Hispanic_Pride_desc:0 "We will embrace hispanic traditions too."
KXWD_PRU_Brave_Kingdom_desc:0 "Our Kingdom Shall be known as the bravest on earth."
KXWD_PRU_Reconquista_desc:0 "We will prepare for a new reconquista of our homeland."
KXWD_PRU_Christian_Army_desc:0 "Our aermy shall be full of true belief in our lord and savior Jesus Christ."
KXWD_PRU_Knights_desc:0 "Our Knights shall be of the new Century. They shall have the resolution of steel."
KXWD_PRU_Bolivian_Coup_desc:0 "We have sent spies into bolivia to coup their weak government."
KXWD_PRU_Hispanic_Ambition_desc:0 "We will follow our ambitions of uniting all spanish speakers and all spanish colonial provinces."
KXWD_PRU_War_North_desc:0 "We are going to war to the north."
KXWD_PRU_War_South_desc:0 "We are going to war to the south."
KXWD_PRU_War_Brazil_desc:0 "We are going to war againts the Brazilian Menace."
KXWD_PRU_War_Mexico_desc:0 "We are going to war to the reconquer the mexican viceroyalty."
KXWD_PRU_War_Spain_desc:0 "We are going to war to reclaim the homeland."
KXWD_PRU_War_America_desc:0 "We are going to war to destroy the protestant empire of the USA"

