CARWD_great_recoquista_desc:0 "We will begin a great Reconquista to reesthablish spain in the world"
CARWD_new_world_desc:0 "We will focus on restoring spain in the new world"
CARWD_operation_havana_desc:0 "Our forces were able to take the guantanamo bay under the flags of pirates and hold of the cuban counterattack"
CARWD_operation_cortez_desc:0 "Now with a base of cube in our control we can retake our great colony of mexico"
CARWD_push_south_desc:0 "with mexico under our grasp we can attack south and take the south american continent"
CARWD_old_world_desc:0 "We will focus on restoring spain in the old world"
CARWD_reclaim_hre_desc:0 "We will claim the title of the Holy Roman Empire"
CARWD_german_huns_desc:0 "With the syndicalist threat dead we can now focus on destroying the germans"
CARWD_proclaim_hre_desc:0 "With the lands of the HRE reconquered we can proclaim the Sacro Imperio Romano"
CARWD_return_to_africa_desc:0 "We will at last return to the african continent and take what is rightfully ours"
CARWD_pink_map_plan_desc:0 "The pink map was a portuguese claim on the rhodesian and katangan colonies of belgium and britain. But with portugal under our control we can use this map to claim colonies for ourselves"
CARWD_cameroon_gambit_desc:0 "Cameroon is rightfully spanish and so we shall take it"
CARWD_asian_ambition_desc:0 "Our ambitions in china will not be quenched. We will start with china"
CARWD_philippine_war_desc:0 "We must reclaim thé Philippines and integrate them into our empire"
CARWD_japan_war_desc:0 "The japanese yoke shall fall under the spanish boot"
CARWD_syndie_threat_desc:0 "The french syndicalists are the greatest threat to us and so we must destroy them"
CARWD_protect_the_pope_desc:0 "We will protect the italian peninsula and the vatican"
CARWD_revenge_on_england_desc:0 "We will take revenge on the brits for helping in destroying our beutifull empire"
CARWD_from_sunrise_to_sunset_desc:0 "PLVS VLTRA and A Solis Ortu Usque ad Occasum shall be our mottos for they are true now at last"

