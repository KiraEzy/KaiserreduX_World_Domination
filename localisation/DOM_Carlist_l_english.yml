CARWD_great_recoquista_desc:0 "We will begin a great Reconquista to reesthablish spain in the world"
CARWD_new_world_desc:0 "We will focus on restoring spain in the new world"
CARWD_operation_havana_desc:0 "Our forces were able to take the guantanamo bay under the flags of pirates and hold of the cuban counterattack"
CARWD_operation_cortez_desc:0 "Now with a base of cube in our control we can retake our great colony of mexico"
