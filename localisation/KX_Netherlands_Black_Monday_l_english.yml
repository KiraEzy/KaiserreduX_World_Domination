 HOL_bm_tt_guarantee_export_firms:0 "§YExpected effects:§!\n- Recovery Progress: §G+7§!\n- Investor Confidence: §G+8§!\n- Public Anger: §R+4§!\n- Gain §YExport Guarantees§! modifier for §Y90 days§!\n- Applies §Y35-day standard cooldown§!"
