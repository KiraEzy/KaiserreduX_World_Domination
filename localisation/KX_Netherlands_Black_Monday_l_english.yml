l_english:
 HOL_black_monday_recovery_category:0 "National Recovery Plan"
 HOL_black_monday_recovery_category_desc:0 "The Cabinet must balance relief, investor trust, and imperial finance while steering the Dutch economy through the collapse.\n\n§YCrisis Readout§!\nRecovery Progress: §G[?hol_bm_progress|0]§!/100\nPublic Anger: §R[?hol_bm_anger|0]§!/100\nInvestor Confidence: §C[?hol_bm_confidence|0]§!/100\n\n§YCooldowns:§! Standard actions apply a shared §Y35-day cooldown§!."

 HOL_bm_initialize_recovery:0 "Form the Recovery Secretariat"
 HOL_bm_initialize_recovery_desc:0 "A dedicated inter-ministerial secretariat is needed to coordinate emergency intervention, employer consultation, and budget control during the crisis."

 HOL_bm_emergency_public_works:0 "Emergency Public Works"
 HOL_bm_emergency_public_works_desc:0 "Launch immediate state-backed projects to absorb unemployment and cool urban unrest while restoring confidence in daily governance."
 HOL_bm_guarantee_export_firms:0 "Guarantee the Export Firms"
 HOL_bm_guarantee_export_firms_desc:0 "Backstop major Dutch exporters and shipping houses so credit and trade contracts survive the ongoing panic."
 HOL_bm_negotiate_wage_restraint:0 "Negotiate Wage Restraint"
 HOL_bm_negotiate_wage_restraint_desc:0 "Broker a compromise between labor and employers to stabilize production and keep inflationary pressure under control."
 HOL_bm_subsidize_necessities:0 "Subsidize Food and Necessities"
 HOL_bm_subsidize_necessities_desc:0 "Protect households from the worst market shocks through targeted subsidies, accepting a slower fiscal recovery in return for social calm."
 HOL_bm_expand_rotterdam_modernization:0 "Expand Rotterdam Port Modernization"
 HOL_bm_expand_rotterdam_modernization_desc:0 "Accelerate investment in Rotterdam's logistics capacity to prepare a stronger commercial rebound."
 HOL_bm_draw_east_indies_revenues:0 "Draw on East Indies Revenues"
 HOL_bm_draw_east_indies_revenues_desc:0 "Channel additional colonial income and extraction into metropolitan stabilization at the cost of mounting imperial strain."
 HOL_bm_cut_colonial_development_budgets:0 "Cut Colonial Development Budgets"
 HOL_bm_cut_colonial_development_budgets_desc:0 "Defer long-term colonial projects and redirect funds to preserve solvency in the metropole."
 HOL_bm_convene_crisis_cabinet:0 "Convene the Crisis Cabinet"
 HOL_bm_convene_crisis_cabinet_desc:0 "Gather party leaders, industrial representatives, and treasury officials for a coordinated emergency line."
 HOL_bm_initialized:0 "Nation Recovery Plan Initalized"
 HOL_bm_standard_cooldown_tracker:0 "Standard Policy Cooldown"
 HOL_bm_standard_cooldown_tracker_desc:0 "Standard recovery actions are on cooldown."
 HOL_bm_extraction_cooldown_tracker:0 "Colonial Extraction Cooldown"
 HOL_bm_extraction_cooldown_tracker_desc:0 "Extraction-based recovery measures are on cooldown."
 HOL_bm_cabinet_cooldown_tracker:0 "Crisis Cabinet Cooldown"
 HOL_bm_cabinet_cooldown_tracker_desc:0 "The crisis cabinet cannot be convened again yet."
 HOL_bm_public_works_modifier:0 "Emergency Public Works Program"
 HOL_bm_public_works_modifier_desc:0 "State-directed construction and labor programs are helping stabilize domestic employment and productive capacity."
 HOL_bm_export_guarantees_modifier:0 "Export Credit Guarantees"
 HOL_bm_export_guarantees_modifier_desc:0 "Government guarantees are sustaining shipping and export contracts through market turbulence."
 HOL_bm_subsidy_modifier:0 "Necessities Subsidy Scheme"
 HOL_bm_subsidy_modifier_desc:0 "Public subsidies shield households from the sharpest effects of the downturn at added fiscal cost."
 HOL_bm_port_modernization_modifier:0 "Rotterdam Modernization Drive"
 HOL_bm_port_modernization_modifier_desc:0 "Accelerated port and logistics investment improves maritime throughput and strategic supply flexibility."
 HOL_bm_colonial_revenue_modifier:0 "Colonial Revenue Transfers"
 HOL_bm_colonial_revenue_modifier_desc:0 "Additional colonial revenue streams are being redirected to support metropolitan recovery."

 HOL_bm_tt_initialize_recovery:0 "Initialize National Recovery Plan:\n- Recovery Progress set to §Y0§!\n- Public Anger set to §Y25§!\n- Investor Confidence set to §Y20§!\n- Colonial Pressure set to §Y0§!"
 HOL_bm_tt_emergency_public_works:0 "§YExpected effects:§!\n- Recovery Progress: §G+8§!\n- Public Anger: §G-6§!\n- Investor Confidence: §G+2§!\n- Gain §YPublic Works§! modifier for §Y90 days§!\n- Applies §Y35-day standard cooldown§!"
 HOL_bm_tt_guarantee_export_firms:0 "§YExpected effects:§!\n- Recovery Progress: §G+7§!\n- Investor Confidence: §G+8§!\n- Public Anger: §R+4§!\n- Gain §YExport Guarantees§! modifier for §Y90 days§!\n- Applies §Y35-day standard cooldown§!"
 HOL_bm_tt_negotiate_wage_restraint:0 "§YExpected effects:§!\n- Recovery Progress: §G+6§!\n- Investor Confidence: §G+5§!\n- Public Anger: §R+2§!\n- If stability is below 45%, Public Anger: §R+2 extra§!\n- Applies §Y35-day standard cooldown§!"
 HOL_bm_tt_subsidize_necessities:0 "§YExpected effects:§!\n- Recovery Progress: §G+4§!\n- Public Anger: §G-10§!\n- Investor Confidence: §R-2§!\n- Gain §YSubsidy§! modifier for §Y60 days§!\n- Applies §Y35-day standard cooldown§!"
 HOL_bm_tt_expand_rotterdam_modernization:0 "§YExpected effects:§!\n- Recovery Progress: §G+6§!\n- Investor Confidence: §G+4§!\n- Public Anger: §G-1§!\n- Gain §YPort Modernization§! modifier for §Y120 days§!\n- Applies §Y35-day standard cooldown§!"
 HOL_bm_tt_draw_east_indies_revenues:0 "§YExpected effects:§!\n- Recovery Progress: §G+10§!\n- Investor Confidence: §G+3§!\n- Public Anger: §R+3§!\n- Colonial Pressure: §R+12§!\n- Gain §YColonial Revenue§! modifier for §Y90 days§!\n- Applies §Y60-day extraction cooldown§!"
 HOL_bm_tt_cut_colonial_development_budgets:0 "§YExpected effects:§!\n- Recovery Progress: §G+9§!\n- Investor Confidence: §G+2§!\n- Public Anger: §R+2§!\n- Colonial Pressure: §R+10§!\n- Applies §Y60-day extraction cooldown§!"
 HOL_bm_tt_convene_crisis_cabinet:0 "§YExpected effects:§!\n- Recovery Progress: §G+5§!\n- Public Anger: §G-3§!\n- Investor Confidence: §G+5§!\n- Applies §Y90-day cabinet cooldown§!"
