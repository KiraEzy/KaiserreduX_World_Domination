 HOL_bm_tt_draw_east_indies_revenues:0 "§YExpected effects:§!\n- Recovery Progress: §G+10§!\n- Investor Confidence: §G+3§!\n- Public Anger: §R+3§!\n- Colonial Pressure: §R+12§!\n- Gain §YColonial Revenue§! modifier for §Y90 days§!\n- Applies §Y60-day extraction cooldown§!"
 HOL_bm_tt_cut_colonial_development_budgets:0 "§YExpected effects:§!\n- Recovery Progress: §G+9§!\n- Investor Confidence: §R-7§!\n- Public Anger: §R+8§!\n- Colonial Pressure: §R+13§!\n- Applies §Y60-day extraction cooldown§!"
 HOL_bm_tt_convene_crisis_cabinet:0 "§YExpected effects:§!\n- Recovery Progress: §G+7§!\n- Public Anger: §G-6§!\n- Investor Confidence: §G+7§!\n- Applies §Y90-day cabinet cooldown§!"

 holbm.1.t:0 "Strike Wave Erupts"
 holbm.1.d:0 "Public anger has boiled over into coordinated labor action across key sectors. Production slows and government authority is challenged at a critical moment in the recovery."
 holbm.1.a:0 "We are losing control"
 holbm.2.t:0 "Capital Leaves the Market"
 holbm.2.d:0 "With confidence at a low ebb, investors are withdrawing funds and delaying commitments. Credit tightens and the recovery timetable is pushed back."
 holbm.2.a:0 "A severe setback"
 holbm.3.t:0 "Colonial Backlash"
 holbm.3.d:0 "Heavy extraction from the colonies has generated backlash and administrative disruption. The resulting turbulence now hurts both confidence and domestic stability."
 holbm.3.a:0 "The costs are catching up to us"
 HOL_idea_economic_recovery_shock:0 "Economic Recovery: Shock"
 HOL_idea_economic_recovery_shock_desc:0 "The first phase of recovery still carries severe dislocation from the Black Monday collapse."
 HOL_idea_economic_recovery_contraction:0 "Economic Recovery: Rebound"
 HOL_idea_economic_recovery_contraction_desc:0 "The recovery program begins stabilizing key sectors, though structural weaknesses remain."
 HOL_idea_economic_recovery_fragile:0 "Economic Recovery: Expansion"
 HOL_idea_economic_recovery_fragile_desc:0 "The economy is improving but remains vulnerable to renewed shocks and policy mistakes."
 HOL_idea_fruit_of_economic_recovery:0 "Fruit of the Economic Recovery"
 HOL_idea_fruit_of_economic_recovery_desc:0 "Disciplined recovery management has translated into durable institutional and industrial gains."
 HOL_bm_status_failing:0 "§R[Failing]§!"
 HOL_bm_status_normal:0 "§Y[Normal]§!"
 HOL_bm_status_thriving:0 "§G[Thriving]§!"
