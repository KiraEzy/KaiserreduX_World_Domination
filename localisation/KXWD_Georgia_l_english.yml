 GEO_Renaming_Kerensky_Legacy:0 "New Soviet Cities"
 GEO_Renaming_Kerensky_Legacy_tooltip:0 "You will be able to rename Volgograd, Vladikavkaz and Ekaterinburg"
 GEO_capital:0 "Question of Capital"
 GEO_portrait_decision:0 "Jughashvili's Portrait"
 GEO_gulag_decisions:0 "General Directorate of Correctional Labor Camps"
 GEO_gulag_decisions_desc:0 "General Directorate of Correctional Labor Camps or in Russian abbreviation, GULAG, was the system of correctional camps created during the era of Lenin. We will revive this system to improve our extraction of natural resources. We can use the political prisoners and all other types of breakers of law in our state's interests. These people can be used to improve the extraction of resources in harsh lands such as Siberia or the Far East. Instead of simply kicking them out of society, they can still work for our great Socialist society."
 GEO_gulag_decisions_tooltip:0 "§YGeneral Directorate of Correctional Labor Camps§!\n"
