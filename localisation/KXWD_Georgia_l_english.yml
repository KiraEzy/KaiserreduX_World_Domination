 GEO_nationalism_idea4: "Georgian Supremacism"
 GEO_nationalism_idea4_desc: "The Georgian people are not only proud of their homeland, they recognise its superiority over the other peoples of the region. Social patriotism has been enforced by the state to the point where the nation understands its position as the strongest, most hard working and resilient populace in the Caucasus and beyond!"
