l_english:
 PPS_totalist:0 "Union of Soviet Labour States"
 PPS_totalist_ADJ:0 "Soviet"
 PPS_totalist_DEF:0 "the Great Union of Soviet Labour States"
 PPS_SOV_totalist:0 "Union of Soviet Socialist States"
 PPS_SOV_totalist_ADJ:0 "Soviet"
 PPS_SOV_totalist_DEF:0 "the Union of Soviet Socialist States"
 GEO_1st_Caucasian_Congress_focus:0 "1st Caucasian Bolshevik Congress"
 GEO_1st_Caucasian_Congress_focus_desc:0 "We will invite all Caucasian ex-Bolsheviks to convene the first Caucasian Bolshevik Congress to discuss the way forward."
 GEO_Summon_generals_focus:0 "Summons the generals "
 GEO_Summon_generals_focus_desc:0 "The Red Army is not afraid of difficult expeditions, and it only takes time to relax. \n We will invite the generals of the Red Army who are still in Britain and France to complete our cause together"
 GEO_second_red_october_focus:0 "Second Red October"
 GEO_second_red_october_focus_desc:0 "It's time to undo the defeats of the October Revolution and the Russian Civil War. While the current man of steel is back, we will never make the same mistakes as our revolutionary predecessors, because we have learned from the mistakes of the beloved Lenin to rise again where he fell . As we march on Russia, the red flag will fly over Moscow again!"
 GEO_Rise_The_Resistance:0 "Rally the Resistance"
 GEO_Rise_The_Resistance_desc:0 "Millions of workers in the Motherland are waiting to be liberated from their oppressors. Of the untold scores of angry labourers, a brave few are united in underground armed resistance movements. We should fund these groups and work with them, cooperating to topple the false regime. If we can instigate them to rise up against exploitation and Capitalist oppression, our revolution shall be further legitimized and ever closer to victory!"
 GEO_Socialist_Propaganda:0 "Socialist Propaganda"
 GEO_Socialist_Propaganda_desc:0 "Nothing can be as influential as the siren call of socialist propaganda. It reveals the truth about  Capitalist oppression and exploitation to the people of the world who walk around clouded and deluded. With the people of Russia aware of these false lies and keyed in to the true glory of Socialism, our victory is all but ensured."
 GEO_Peace_Labour_May:0 "Peace. Labour. May."
 GEO_Peace_Labour_May_desc:0 "The Bear has been vanquished on the fields of battle and the red banner is finally flying high over the Red Square. We are the New Russia - more stable, more justful and more developed than any before us. Let us be the beacon for Socialism for our region and the whole world to see."
 GEO_Aftermath_Of_Civil_War:0 "The Revolution Renewed"
 GEO_Aftermath_Of_Civil_War_desc:0 "We stand victorious, with our flag flying high from Moscow to Yakutsk. Though our victory is worth celebrating, we have more important tasks at hand. We must now deal with the devastation wrought by the war. With much of Russia under our rule, a strong opposition to our regime is still present in the army, among the citizens, and politicians, and this must be rectified if our power is to be maintained."
 GEO_Deal_With_Opposition:0 "Deal With Opposition"
 GEO_Deal_With_Opposition_desc:0 "The opposition to our regime is flourishing in Russia, damaging the foundations of our power. We should deal with them immediately, or stand by and watch as they tear apart our new regime from within. We must separate the wheat from the chaff."
 GEO_Fate_Of_Socialist_Parties:0 "Fate of Socialist Parties"
 GEO_Fate_Of_Socialist_Parties_desc:0 "With the revolution secured, the other socialist parties present in Russia are now demanding representation in our government. We should decide whether we should allow it. Though Leftist Unity is important in theory, they could prove to be future political obstacles. We must choose carefully."
 GEO_Cement_The_Regime:0 "Cement the Regime"
 GEO_Cement_The_Regime_desc:0 "Our regime is here to stay, defeating our enemies and silencing our detractors along the way to secure our rule. We have finally dealt with the political crisis that has plagued our administration since taking power and the revolution it's thoroughly secured. We must now work to improve the economy to benefit all within our state, and not just the few at the top."
 GEO_Economic_Integration:0 "Economic Integration"
 GEO_Economic_Integration_desc:0 "The current inflation rate is rather high, and private property has not been totally destroyed and redistributed yet. We need to rebuild the economy as soon as possible, so we shall integrate whatever private property is left that is worth value and begin using it for the state’s needs, either through liquidation or overhauling it for our uses. Furthermore, seizing assets for capital instead of foolishly printing more money will allow us to tackle inflation as well."
 GEO_Expand_The_Plan:0 "Expand the Plan"
 GEO_Expand_The_Plan_desc:0 "With the economy in our hands and with our newest reforms and programs showing promising results, the plan shall be expanded. There is still much to do if we are to fully modernize this nation, and as such new funding will need to be procured and new goals set."
 GEO_Industrialize_The_Motherland:0 "Rapid Industrialization"
 GEO_Industrialize_The_Motherland_desc:0 "Russia is in a strong need of industrialization - long devastated by war and economic collapse. Our few plants are empty and the production is at its lowest its been in since the factories first opened. We need rapid industrialization and economy building now, lest our entire nation stay stuck in the past as the rest of the world reaches towards the future."
 GEO_Cement_The_Economy:0 "Socialism in One Country"
 GEO_Cement_The_Economy_desc:0 "The economy now shows signs of stable growth after our ceaseless efforts to reverse the downturn of Black Monday and to continue our rebuilding efforts from the Civil War seemingly pay off. It appears we have dealt with the economic devastation, or most of it, for now, but we must push ever higher to rise into true prosperity."
 GEO_Fate_Of_Russian_Army:0 "Fate of Russian Army"
 GEO_Fate_Of_Russian_Army_desc:0 "Due to the White’s victory, much of the Russian Army is still full of monarchist officers and reactionary generals. They should be either arrested or executed - and the army dissolved to further remove any lasting taint. All cleared soldiers and officers shall instead join the new people's Army. The Red Army shall rise once more."
 GEO_Increase_Military_Budget:0 "Increase Military Budget"
 GEO_Increase_Military_Budget_desc:0 "With the possible traitors cleansed from our ranks and the economy well on its way to prosperous function, we must begin to address our armed forces. The military budget should be extended to allow our military greater room to expand and develop new things while also actively creating new places to work, furthering our economic recovery as more sign up to serve Motherland."
 GEO_Main_Military_Council:0 "Establish the GlavVoyenSovet"
 GEO_Main_Military_Council_desc:0 "The GlavVoyenSovet (Main Military Council) shall be established to deal with all the problems our military forces are currently occupied with. They shall direct all levels of the military hierarchy, ensuring efficient applications of our armed forces while also ensuring that loyalty to the state above all else is maintained."
 GEO_Cement_The_Army:0 "Cement the Army"
 GEO_Cement_The_Army_desc:0 "The army is under our full control now. The soldiers are training, the new weapons are being produced, new doctrinal innovations are being developed and implemented, modern weapons of war roll off the assembly lines - we are becoming strong and well defended. Never again will the Red Army suffer a defeat as horrid and catastrophic as the Russian Civil War!"
 GEO_Into_The_Future:0 "Into the Future"
 GEO_Into_The_Future_desc:0 "Our people march into the future, enjoying happy lives in the state where all are equal. Our new industry hums along as our armies stand stalwart and ready to serve. Our nation and its people are ready to protect our sovereignty. We march together, into our destiny."
 GEO_Crush_The_Hegemone:0 "Crush The German Hegemony"
 GEO_Crush_The_Hegemone_desc:0 "It's time to end German Hegemony over Europe. For too long the Huns have lorded over the peoples of the continent for their own gain. The Ukrainians, Belarussians, Latvians, Lithuanians, Estonians, and more all languish under German occupation. Their workers are begging to be liberated, and we shall answer the call."
 GEO_Expand_Into_Caucasus:0 "Expand Into Caucasus"
 GEO_Expand_Into_Caucasus_desc:0 "The rest of the Caucasus region lies independent and wild. We must rectify this position at once and conquer the remaining independent peoples in these lands. All peoples between the Black and Caspian seas, whether they live on the plains like the Cossacks or high in the mountains like the Georgians, are truly Russian, regardless of what they believe otherwise, for the light of Socialism unites us all."
 GEO_Demand_Karelia:0 "Demand Karelia"
 GEO_Demand_Karelia_desc:0 "Finland, long a thorn in our side, stabbed us in the back and stole Karelia from its rightful owners as we witnessed brother fight brother in the Civil War. With the Red’s loss avenged. we must approach their current regime at once and demand the return of this rightfully-Russian clay, lest the Finnish feel our wrath."
 GEO_Demand_Bessarabia:0 "Demand Bessarabia"
 GEO_Demand_Bessarabia_desc:0 "Bessarabia is not only important strategically, but also culturally, seeing as there is a Russian minority living there. We will demand it’s hand over from the Romanian government."
 GEO_Liberate_Balkans:0 "Liberate the Balkans"
 GEO_Liberate_Balkans_desc:0 "The Balkans is full of slavic souls awaiting their saviour who shall whisk them away from foreign oppression and misguided regimes. That savious shall be our proud nation! We shall march into the great cities of Belgrade and Sofia and many others, liberating our ethnic brethren from the jackbooth of lesser states."
 GEO_Revolution_In_Central_Asia:0 "Revolution in Central Asia"
 GEO_Revolution_In_Central_Asia_desc:0 "Central Asia is the rightful territory of any unified Russian State, first falling sway to our nation’s will in the 19th century. With the chaos of Black Monday along with the Civil War and the Weltkrieg, the region has slipped from our grasp. We must bring with us the spark of revolution to the Peoples of the Steppes, returning them to their rightful place within our grasp."
 GEO_Invade_Middle_East:0 "Invade Middle East"
 GEO_Invade_Middle_East_desc:0 "The Middle East is a vast, chaotic land of untold bounty and usefulness despite its reputation as a barren sand pit. With the region still recoiling from the fires of the Arab-Ottoman War, there is no better time than now to attempt to raise our flag from Cairo to Baghdad to Constantinople itself!"
 GEO_Deal_With_Persia:0 "Deal With Persia"
 GEO_Deal_With_Persia_desc:0 "Long as Russia sought to conquer Persia, desiring its resource rich lands and warm-water access far from the ports of foreign superpowers. With the region long destabilized as the Ottomans struggled against collapse, we will swoop into these areas and raise the Russia flag height above Tehran!"
 GEO_Move_Into_Afghanistan:0 "Raid Into Afghanistan"
 GEO_Move_Into_Afghanistan_desc:0 "The Graveyard of Empires earned its nickname through blood and steel, repelling foreign invaders successfully for centuries. We will march into Kabul and prove their nickname wrong. We shall do what not even the great Alexander or Darius, or the mighty Mongols or British, could do and make the Graveyard of Empires the newest blossoming acquisition of our great nation!"
 GEO_Intervene_In_India:0 "Intervene in India"
 GEO_Intervene_In_India_desc:0 "The Great Game between the now fallen British and Russia Empires was a series of international interactions over the fate of India, with Russia constantly eyeing the Jewel of the British Empire for itself. With the collapse of the Anglo’s in their hubberace and our rise to reunify the lands of the Russians, we are now in a prime position to finish the Great Game once and for all. Russian boots will march into Delhi at last!"
 GEO_The_Eastern_Threat:0 "The Eastern Threat"
 GEO_The_Eastern_Threat_desc:0 "To the East lies the old foe of Russia: the Japanese Empire. Shocking the world in their victory over the Tsarist regime of old, they have forever since proven to be an imposing and ever-present rival to Russian ambitions in the East. We must move to strike these wretched foes to reclaim the lands they have stolen from us, avenging the loss of 1905."
 GEO_China_Policy:0 "Intervene in China"
 GEO_China_Policy_desc:0 "The Chinese Region is now in the state of civil war. Various warlords and governments try to establish control over all territores of former Qing Empire. Both Germans and Japanese try to draw China into their sphere of influence. However, Russia also has claims to the Chinese Region. We should choose a side to support and try to help it establish control over all China and have a strong ally as well."
 GEO_Support_LKMT_Focus:0 "Send Aid to Kuomintang"
 GEO_Support_LKMT_Focus_desc:0 "China is as divided as ever, thankfully there are socialists fighting for justice for the Chinese masses. We must support our allies in the Kuomintang"
 GEO_SOV_Assert_Our_Influence_Far_East:0 "Assert Our Position in Asia"
 GEO_SOV_Enemy_In_The_West_desc:0 "The greatest losses of the Weltkrieg was, in all honesty, not in the East or the South. It was losing our most industrialised regions of the west. It's time they are returned to their rightful owners."
 GEO_SOV_Mongolian_Issue:0 "The Mongolian Issue"
 GEO_SOV_Mongolian_Issue_desc:0 "Not only the Mongolians occupy Tuva, which is our rightful land, but also stand in a our way into China. We must do something about it."
 GEO_Join_The_Internationale:0 "Join The Internationale"
 GEO_Join_The_Internationale_desc:0 "Rather than having all of us try to stand up to the German imperialists on our own we should join hands with our comrades in Britain, France, Italy and beyond."
 GEO_The_Fourth_Internationale:0 "Comintern"
 GEO_The_Fourth_Internationale_desc:0 "Revisionists in the west must not be negotiated with. We should create our own alliance of countries loyal to us."
 GEO_SOV_Into_The_Caucasus:0 "Red Cossacks"
 GEO_SOV_Into_The_Caucasus_desc:0 "Lost after the Weltkrieg, the Don-Kuban Union is a reactionary state run by Cossack warlords. Beyond their tyranny lies counter-revolutionaries and religious fundamentalists right at the edge of the theocratic Islamic Empire in the south. As long as they remain at large, these states pose an active threat to our revolution."
 GEO_Return_Imperial_Splinter_States:0 "Return Imperial Splinter States"
 GEO_Return_Imperial_Splinter_States_desc:0 "The Treay of Brest-Litovsk was a disaster for the proletariat, enslaving them under regimes made only for the German exploitation. We must fix that injustice."
 GEO_SOV_Polish_Question:0 "Reclaim Central Poland"
 GEO_SOV_Polish_Question_desc:0 "The Poles were always a rebellious bunch, clamering for their independence. Yet the forgot that the consitution of Congress Poland made them bound eternally with Russia. While the devil Tsar is long gone, we must bring the light of the revolution to the Polish people."
 GEO_SOV_Enemy_In_The_West:0 "Enemy In The West"
 GEO_SOV_The_Final_Battle:0 "The Final Battle"
 GEO_SOV_The_Final_Battle_desc:0 "The treaty of Brest-Litovsk handed over millions of workers to the German industrialists on a silver platter and gave them Russia's most heavily industrialized lands on top of it. It's our duty to liberate the people of the East from the German yoke once and for all."
 GEO_Integrate_Far_Eastern_Republic:0 "Integrate Far-Eastern Republic"
 GEO_Integrate_Far_Eastern_Republic_desc:0 "With the overthrow of that Japanese lapdog, that vile reactionary Kolchak by the People’s Republican Army we can begin the process of uniting our nations into one one and mend the divide between our proletariat population."
 GEO_Raise_NRA:0 "Raise The NRA!"
 GEO_Raise_NRA_desc:0 "The NRA, or People's Republican Army of Far-Eastern Republic is the militia, operating in the Transamur. We can try to destabilize the situation in the Far-East by asking NRA to raise their army and to promise them full military support."
 GEO_SOV_India_Policy:0 "Support [BHC.GetName]"
 GEO_SOV_India_Policy_desc:0 "Our Indian brothers in Bharatiya Commune have to struggle with the aristocratic princes and imperialist dominionists in their liberation of the subcontinent. Their situation is precarious, we must help them."
 GEO_SOV_Demand_North_Iran:0 "Claim North Iran"
 GEO_SOV_Demand_North_Iran_desc:0 "Securing our grasp of Northern Iran is important to ensure our domination of the Caspian Sea area and the liberation of Iranian workers from the years of Persian monarchy’s opression."
 GEO_SOV_Demand_Bessarabia_Back:0 "Demand Bessarabia Back"
 GEO_SOV_Demand_Bessarabia_Back_desc:0 "Bessarabia is not only important strategically, but also there are many workers opressed by the disgusting monarchists and iron guardists, including the Russian minority living there. We will demand it’s hand over from the Romanian government."
 GEO_SOV_Assert_Our_Influence_Far_East_desc:0 "Our position in the East relative to Japan is not stong enough to go to war with them. While we would very much like to liberate the Japanese workers, we are forced to negotiate for the return of Sakhalin, our rightful land."
 GEO_Bring_Revolution_To_Balkans:0 "Bring Revolution to the Balkans"
 GEO_Bring_Revolution_To_Balkans_desc:0 "Our southern brothers have spent to long under the tyranny of foreign empires, being tossed from one opressor to the other. We must liberate them and give them the equality and justice they rightfully deserve."
 GEO_Cooperate_With_CSA:0 "Cooperate with CSA"
 GEO_Cooperate_With_CSA_desc:0 "One of the prime examples of capitalist degeneracy, the USA, has been toppled and their workers are now unshackled by the exploiting scum. It would be wise to strengthen our cooperation with the new government of CSA."
 GEO_Support_Anticolonial_Uprisings:0 "Support Anti-colonial Uprisings"
 GEO_Support_Anticolonial_Uprisings_desc:0 "We must not forget that there are still many people in the world that don’t have their own nations. By supporting uprisings againts the colonial imperialists we can help them achieve their liberation. After all, anti-colonialism is as natural as socialism for the proletariat."
 GEO_Zhukovs_Reform_Plan:0 "Zhukov's Reform Plan"
 GEO_Zhukovs_Reform_Plan_desc:0 "Zhukov has come up with a plan with the goal of increasing conscription while also standardizing equipment production. This will allow us to further churn out more weapons of war from our factories, further fueling our future war efforts. With these reforms underway, the fires of innovation and efficiency shall burn bright within every Russian factory and foundry."
 GEO_Mass_Conscription_SOV:0 "Mass Conscription"
 GEO_Mass_Conscription_SOV_desc:0 "In order to win the wars that are inevitably coming down the line, especially with the world situation growing ever more chaotic and with our ambitions of conquest and liberation in the name of socialism, we must issue higher quotas on conscriptions while lowering the bar for possible volunteers and conscripts. We will need bodies if we are to win."
 GEO_Standarisation_Of_Equipment_Production_SOV:0 "Standardization of Equipment Production"
 GEO_Standarisation_Of_Equipment_Production_SOV_desc:0 "Standardized production methods will enable us to produce all of our military equipment more efficiently and at far faster rates. Not only will this increase production rates overall, it will also improve the quality of our weapons. As parts, ammunition, and manufacturing methods become standardized, incompatibility issues between equipment parts and types will become a thing of the past, meaning less headaches for our soldiers on the frontlines as well."
 DKB_economic_totalist_4:0 "Economic Upheaval"
 GEO_Attack_Europe:0 "Reclaim Eastern Europe"
 GEO_Attack_Europe_desc:0 "The entire Russian state is under our command now. It is time to reclaim our soil in Eastern Europe from different artificial states."
 GEO_Invade_Finland:0 "Bring Finland to its Knees"
 GEO_Invade_Finland_desc:0 "Finland and their false King have mocked Russia for long enough. It's time we send Russian troops to Helsinki once again."
 GEO_Invade_WHR:0 "Invade White Russia"
 GEO_Invade_WHR_desc:0 "The breakway state commonly called White Russia was claimed during the partitions of old, only to be taken by the Kaiser. We will not lose our lands this time!"
 GEO_Invade_Ukraine:0 "Resolve the Ukrainian Problem"
 GEO_Invade_Ukraine_desc:0 "Powerful German armies had been protecting Ukraine from annexation since the October revolution however now that we are back in power our chance to reunite Ukraine with Russia is now."
 GEO_End_Poland:0 "Reclaim Poland"
 GEO_End_Poland_desc:0 "The Poles were always a rebellious bunch, clamering for their independence. Yet they forgot that the consitution of Congress Poland made them bound eternally with Russia. Let’s remind them of that fact."
 GEO_End_Germany:0 "Time to End the Reich"
 GEO_End_Germany_desc:0 "The losses at the peace treaty of Brest-Litovsk are too great to count. It's time we return Russia to the glory we held prior to the Weltkrieg!"
 GEO_Attack_Mongolia:0 "Attack Mongolia"
 GEO_Attack_Mongolia_desc:0 "Not only the Mongolians occupy Tuva, which is our rightful land, but also stand in a our way into China. We must do something about it."
 GEO_Demand_KVZHD:0 "Demand KVZHD"
 GEO_Demand_KVZHD_desc:0 "The KVZhD, or Chinese Eastern Railway, was built by us to help with the transportation to the port of Vladivostok. It was lost after the Revolution when it was taken over by the Chinese.  It’s time to demand it’s return, along with all the lands surrounding it."
 GEO_Secure_Straits:0 "Secure the Straits"
 GEO_Secure_Straits_desc:0 "Russia has always aspired to control the City of the World's Desire, although fate has cruelly kept this just out of our grasp. We are presented with an invaluable opportunity to take the Bosporus under our control."
 GEO_Reclaim_Lands:0 "Reclaiming Our Lands"
 GEO_Reclaim_Lands_desc:0 "Now that we are Russia we must collect our former land from the tyrants that rule in central Europe"
 GEO_Attack_CA:0 "Reclaim Central Asia"
 GEO_Attack_CA_desc:0 "The entire Russian state is under our command now. It is time to reclaim our soil in Central Asia from different insurgent states."
 GEO_Demand_ALO:0 "Secure Kazakhstan"
 GEO_Demand_ALO_desc:0 "Kazakhstan is vast and wealthy. Once brought into the fold we can look even further south, to Turkestan."
 GEO_Invade_Turkestan:0 "Secure Turkestan"
 GEO_Invade_Turkestan_desc:0 "Turkestan is not particularly wealthy or even populous. But soon enough, it will be ours, and it will serve excellently as a bridgehead to the wealthy Persian and Indian provinces, should we need it."
 GEO_on_our_own:0 "The Comintern"
 GEO_on_our_own_desc:0 "The Georgian Soviet State should not be a lapdog to any other nation. It's time we form our own alliance and no longer dance to the pipe of others!"
 GEO_Integration_decisions:0 "Territorial Integration"
 GEO_Integration_decisions_desc:0 "We should make strives to reintegrate territories lost to us during the collapse of the Empire. The change in management from the old regime will have significant effects on our industry however in the long term it will leave Russia strong enough to face the dangers of the world."
 GEO_Integrate_Karelia:0 "Integrate Karelia"
 GEO_Integrate_Country:0 "Integrate [FROM.GetNameDef]"
 GEO_Integrate_Country_desc:0 "Average Compliance in [FROM.GetName] is [?FROM.core_compliance|Y0]"
 GEO_Integrate_State:0 "Integrate [FROM.GetName]"
 GEO_Integrate_Estonia:0 "Integrate Estonia"
 GEO_Integrate_Latvia:0 "Integrate Latvia"
 GEO_Integrate_Lithuania:0 "Integrate Lithuania"
