 GEO_Integrate_Western_Ukraine:0 "Integrate Western Ukraine"
 GEO_Integrate_Eastern_Ukraine:0 "Integrate Eastern Ukraine"
 GEO_Integrate_Bessarabia:0 "Integrate Bessarabia"
 GEO_Integrate_Don:0 "Integrate Don"
 GEO_Integrate_Kuban:0 "Integrate Kuban"
 GEO_Integrate_Kalmykia:0 "Integrate Kalmykia"
 GEO_Integrate_MTR:0 "Integrate Mountain Republic"
 GEO_Integrate_MTR_MPO:0 "Establish Muslim People's Organization Chapter in Mountain Republic"
 GEO_Integrate_Georgia:0 "Integrate Georgia"
 GEO_Integrate_Armenia:0 "Integrate Armenia"
 GEO_Integrate_Azerbaijan:0 "Integrate Azerbaijan"
 GEO_Integrate_Azerbaijan_MPO:0 "Establish Muslim People's Organization Chapter in Azerbaijan"
 GEO_Integrate_Kazakhstan:0 "Integrate Kazakhstan"
 GEO_Integrate_Kazakhstan_MPO:0 "Establish Muslim People's Organization Chapter in Kazakhstan"
 GEO_Integrate_Turkestan:0 "Integrate Turkestan"
 GEO_Integrate_Turkestan_MPO:0 "Establish Muslim People's Organization Chapter in Turkestan"
