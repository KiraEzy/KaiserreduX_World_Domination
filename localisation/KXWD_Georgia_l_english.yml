 GEO_Integrate_Sakhalin:0 "Integrate Sakhalin"
 GEO_Integrate_North_Iran:0 "Integrate North Iran"
 GEO_Integrate_North_Iran_MPO:0 "Establish Muslim People's Organization Chapter in North Iran"
 GEO_Integrate_Mongolia:0 "Integrate Mongolia"
 GEO_Integrate_ETS:0 "Integrate East Turkestan"
 GEO_Integrate_ETS_MPO:0 "Establish Muslim People's Organization Chapter in East Turkestan"
 GEO_Integrate_Manchuria:0 "Integrate Manchuria"
 GEO_Integrate_FER:0 "Integrate [TRM.GetNameDef]"
 GEO_Use_MPO:0 "Promote Socialism in [FROM.GetName]"
 GEO_Spreading_The_Revolution_decisions:0 "Spreading the Revolution"
 GEO_Support_LKMT:0 "Support LKMT" 
 GEO_China_Policy_decisions:0 "Chinese Civil Strife"
 GEO_China_Policy_decisions_desc:0 "The Chinese Region is now in the state of civil war. Various warlords and governments try to establish control over all territores of former Qing Empire. Both Germans and Japanese try to draw China into their sphere of influence. However, Russia also has claims to the Chinese Region. We should choose a side to support and try to help it establish control over all China and have a strong ally as well."
 GEO_Send_Attache:0 "Send Attache to [FROM.GetNameDef]"
 GEO_China_Send_Attache_Back:0 "Send Attache Back"
 GEO_Send_Equipment_China:0 "Send Equipment to LKMT"
 GEO_Intervene_In_China:0 "Intervene in China"
 GEO_Assert_Our_Influence_Far_East:0 "Assert Our Position in Asia"
 GEO_Assert_Our_Influence_Far_East_desc:0 "Our position in the East relative to Japan is not stong enough to go to war with them. While we would very much like to liberate the Japanese workers, we are forced to negotiate for the return of Sakhalin, our rightful land."
 GEO_chairman_stalin:0 "Chairman Jughashvili"
 GEO_chairman_stalin_desc:0 "New chairman now sits in the castle of Bolshevik Communist Party. We shall transform Russia under the vision of the Chairman Jughashvili."
 GEO_Institutionalize_Terror:0 "Institutionalize Terror"
 GEO_Institutionalize_Terror_desc:0 "The people are nearly riotous still over our seizure of power. We must secure the regime against counter revolutionaries both within and outside our state. We shall dispatch the Cheka into the streets to find the instigators of this continued unrest and put an end to their charade of ‘restoring power to the people’. While we do our work the Army will crush what resistance remains. When all goes to plan we should have full compliance within a month or so of the operations beginning. Civilian casualties are projected to be within acceptable boundaries."
 GEO_cult_of_stalin:0 "Father of Georgia and the Union"
 GEO_cult_of_stalin_desc:0 "Our Union is a great family of many different people directed by the Georgian People, and every family needs a head. Comrade Jughashvili is that head, who ensures that its many children are educated in Georgian Socialist thought and who guides our efforts towards a bright future. Where he must be stern, he is stern, but he is always guided by a sense of Georgian Unionism and Nationalism."
 GEO_Mass_Collectivisation:0 "Mass Collectivisation"
 GEO_Mass_Collectivisation_desc:0 "The farmlands of Russia's great expanses have never been controlled by the farmer, but instead by the Grand Prince, the Tsar, and the capitalist. But now there is another enemy in the village - the Kulak, a capitalist farmer, who seeks only profit margin. This repression of the worker cannot be allowed to persist, and as such we must embark on a radical program of dekulakization of our agricultural industry. Only under collective ownership can they truly be free from the capitalist's jackboot."
 GEO_stalin_atom:0 "Project "Birtvuli""
 GEO_stalin_atom_desc:0 "We know that scientists in other countries are hard at work to develop methods to turn the most fundamental forces in the universe into a new form of weapon. While we are behind, we can use their work to advance our own, and ensure the parity of destruction remains."
 beria_labour:0 "Authorise Slave Labour"
 beria_labour_desc:0 "Chairman has grand visions for Russia, visions that can only possible with an enhanced labour force. Society’s ‘undesirables’ such as criminals, political prisoners, ethnic minorities, unemployed, the homeless and even orphans will be used for slave labour to construct our industrial future."
 beria_desires:0 "Appoint Beria"
 beria_desires_desc:0 "Beria is a man who we can trust with elimination of our opponents to our power. He will be appointed the head of Cheka. With him the state is secure."
 beria_gulag:0 "One Large Gulag"
 beria_gulag_desc:0 "Abundance of resources dominate the landscape of Siberi, labourers toil against their will to construct imposing factories and military outposts, the Cheka patrol the streets of the nation like prison guards. Jughashvili and Beria has forged Russia into a rigorous and well run labour camp, one that spans across cities, mountains and farmland."
 GEO_trans_state_focus:0 "The Great Transcaucasian Union"
 GEO_trans_state_focus_desc:0 "From Tbilisi to Baku the flag of Transcaucasia hangs high signaling the new era that dawns on the people of Georgia, Armenia and Azerbaijan. This union will be formalised through the creation of the Great Transcaucasian Socialist State."
 GEO_the_georgian_state_focus:0 "The Georgian State"
 GEO_the_georgian_state_focus_desc:0 "We should not forget our roots. We are Georgians. The proud and might nation of Georgia. Will put all other Caucasian nations under our heel and protect them from foreigners."
 geo.502.t:0 "Forever Red October"
 geo.502.d:0 "Perhaps no one thought that the former Soviets and Red Army were rebuilt in the Caucasus and developed rapidly in just a few years. Just this morning, Jugashvili, Supreme Chairman of the Caucasus Soviet, announced that the Red Army would march towards Moscow. With this, they will wash away their shame, and now the Red Army is the most powerful."
 geo.502.a:0 "The October Revolution Reappears"
 geo.507.t:0 "First Caucasian Bolshevik Congress"
 geo.507.d:0 "Jugashvili convened the new Caucasian Bolshevik Congress in Tbilisi this afternoon. Jugashvili and Beria made speeches one after another at the conference. Kaganovich, Budyonny, Ordzhonikidze and others who attended the conference discussed the possibility of continuing the revolution in the Caucasus. The congress finally elected Jugashvili as secretary of the Bolshevik Caucasus district and reached a final resolution  \n the Bolsheviks will continue their revolution in the Caucasus!"
 geo.507.a:0 "Long live the Bolsheviks!"
 geo.508.t:0 "The Greater Communist International"
 geo.508.d:0 "The time has come for to release from the chains of the pesky French Internationale. We must create our own alliance which will never give in to Western revisionists. We shall lead our nation in its struggle to achive Social Nationalism!"
 geo.508.a:0 "Comintern Will Prevail!"
 geo.509.t:0 "City on Neva"
 geo.509.d:0 "Now that we have decided to revive the Bolshevik Revolution in Russia, there are still reminders of the revolutionary year of 1917. Now that we are in charge we can name the city the home of Revolution after the name of our most glorious revolutionary leaders - Vladimir Lenin."
 geo.509.a:0 "We need to show respect to Lenin!"
 geo.509.b:0 "Petrograd is the name of the city and will remain so."
 geo.510.t:0 "Russian Cities"
 geo.510.d:0 "As part of the Kerensky reforms in the 20s, many cities were renamed, the names of some bore reminders of the monarchical past of Russia, others were called in the German manner, the worst enemy of Russia, because of which the great changes of the last 20 years took place. Now that we are in power, we can give some cities new names to commemorate names of our bolshevik friends and allied revolutionaries. We can also give new names to some cities to commemorate the name of our glorious leader Jughashvili who took Stalin as a nickname during revolutionary times. How should we proceed with them?"
 geo.510.a:0 "Let's rename the cities to honor our revolutionary leaders are."
 geo.510.b:0 "Kerensky brought democracy to Russia, and his cause will live on."
 geo.511.t:0 "Question of Union's Capital"
 geo.511.d:0 "Finally, we are in control of Russia. The Union is now restored. Now that we are in control of a big state there are many options. \n \n First option: Moscow. Capital of the Russian state until 1721. Best option for the governance of our vast Russian territories. Well defended. \n \n Second Option: Petrograd. Capital of the Russian state since 1721 and its founding by Peter the Great. Home of the First October Revolution. Risky because the city is at the very edge of the state's borders. Most legitimate capital of Russia. \n \n Third Option: Volgograd. City decently defended. A great balance for the capital between Caucasus and Russia, connecting both. \n \n Fourth Option: Tbilisi. Our homeland. Well-defended in the mountains. Center of Georgia. Close to our people and core of our nation."
 geo.511.a:0 "Home of The Revolution. Petrograd."
 geo.511.b:0 "Mosk'ovi. We cannot risk the capital being on edge."
 geo.511.c:0 "Volgograd. The balance between Caucasus and Russia."
 geo.511.e:0 "Tbilisi. Our homeland."
 geo.512.t:0 "Old Name"
 geo.512.d:0 "Years ago, during the times of Revolution, Jughashvili adopted the name "Stalin", which means the man of steel. Should Jughashvili adopt this name as his new official name once again? It will make our name pronunciation easier to our Soviet Comrades."
 geo.512.a:0 "Splendid Idea!"
 geo.512.b:0 "I am Georgian and my name will remain Georgian!"
 geo.513.t:0 "Greater Ambitions"
 geo.513.d:0 "We have defeated all our enemies. Our state is finally strong. We have achieved our status of a regional power. We defended ou state against all enemies and united our dear Caucasus to stand against all our neighbor invaders. We have two options. We can continue to expand Sakartvelo, conquer our neighbors and, perhaps, even restart the October Revolution in Russia. Or, we can close and isolate ourselves in the Great Mountains of Caucasus and not let a single foreigner through our gates of peace and prospertity. Now that we can project our power onto the world and be more ambitious, how should we proceed with our foreign policy?"
 geo.513.a:0 "Chairman Will expand our state further!"
 geo.513.b:0 "It is time we isolate ourselves in the Great Mountains!"
 geo.10000.t:0 "Jughashvili's Portrait"
 geo.10000.d:0 "What will the portrait of Ioseb Jughashvili/Stalin be?"
 geo.10000.a:0 "Fur Coat Stalin"
 geo.10000.b:0 "Ushanka Stalin"
 geo.10000.c:0 "Vanilla Stalin"
 geo.10000.g:0 "Concerned Stalin"
 geo.10000.e:0 "Smoking Stalin"
 geo.10000.f:0 "Better Vanilla Stalin"
 geo.1923.t:0 "Exiles Arrive From Third Internationale"
 geo.1923.d:0 "When the revolutions broke out in France and Britain, many Bolshevik officers offered their services to the British and French and since then had resided in the countries of Third Internationale, serving and training their Armies. But now they have returned once more and are ready to help in the fight for a red Russia."
 geo.1923.a:0 "The revolution fights on."
 geo.1923.b:0 "Eeh... send them back."
 geo.1924.t:0 "Tukhachevsky's Arrival"
 geo.1924.d:0 "General Tukhachevsky, war hero, former Red Army commander has approached us with a request to join our forces. From certain sources we know that Tukhachevsky is internationalist, and, even more, he is more a carreerist and a really talented military leader."
 geo.1924.a:0 "Let him serve us!"
 geo.1924.b:0 "Revisionist!"
 geo.1925.t:0 "Frunze's Offer"
 geo.1925.d:0 "General Frunze, war hero, former Red Army commander has approached us with a request to join our forces. Frunze is a really talented military leader and, perhaps, having him serve us will give us more points in our struggle against capitalism."
 geo.1925.a:0 "Let him serve us!"
 geo.1925.b:0 "Revisionist!"
 geo.514.t:0 "What do to with Don Host?"
 geo.514.d:0 "The land of the Don Cossack host at the Black Sea, was historically a part of the Russian Empire until, during the chaos of the Bolshevik Revolution and ensuing Civil War and German Intervention. Russia seems ready to reincorporate this petty state into the Motherland. How shall we proceed? Whatever course of action we take, we must be prepared for a conflict of interests with Ukraine, as they will certainly not take lightly our ambitions, especially towards a state friendly to them."
 geo.514.a:0 "Demand their submission!"
 geo.515.t:0 "Georgia demands our submission!"
 geo.516.t:0 "Don Cossacks Submit"
 geo.516.d:0 "Despite their willingness of independence, there's no future for their unrecognized state. They made the right choice."
 geo.516.a:0 "Welcome back, boys"
 geo.524.t:0 "Status of Kalmykia"
 geo.524.d:0 "A nation, populated by buddhists and Astrakhan Cossacks was once a great Khanate, but now it is a pawn before the queen. Kalmykia gained its independence recently and is an unrecognized state so there will be no problem in crushing it."
 geo.524.a:0 "Demand their submission!"
 geo.525.t:0 "Georgia demands our submission!"
 geo.526.t:0 "Kalmykia Submits"
 geo.526.d:0 "Despite their willingness of independence, there's no future for their unrecognized state. They made the right choice."
 geo.526.a:0 "Welcome back, boys"
 geo.534.t:0 "What do to with Kuban?"
 geo.534.d:0 "The lands of the Kuban Cossack hosts at the Black Sea, was historically a part of the Russian Empire until, during the chaos of the Bolshevik Revolution and ensuing Civil War and German Intervention. Russia seems ready to reincorporate this petty state into the Motherland. How shall we proceed? Whatever course of action we take, we must be prepared for a conflict of interests with Ukraine, as they will certainly not take lightly our ambitions, especially towards a state friendly to them."
 geo.534.a:0 "Demand their submission!"
 geo.535.t:0 "Georgia demands our submission!"
 geo.536.t:0 "Kuban Submits"
 geo.536.d:0 "Despite their willingness of independence, there's no future for their unrecognized state. They made the right choice."
 geo.536.a:0 "Welcome back, boys"
 geo.544.t:0 "The Status of the Mountain Republic"
 geo.544.d:0 "The peoples of the Caucasus Mountains have been our enemies for a long time - we tried to conquer the Mountains for decades in the past. We know that these peoples endorse freedom the most and it will be hard for us to negotiate. Nevertheless, we have several choices."
 geo.544.a:0 "Demand their submission!"
 geo.545.t:0 "Georgia demands our submission!"
 geo.546.t:0 "Mountain Republic Submits"
 geo.546.d:0 "Despite their willingness of independence, there's no future for their unrecognized state. They made the right choice."
 geo.546.a:0 "Welcome back, boys"
 geo.547.t:0 "Name of our Union"
 geo.547.d:0 "Now that we have conquered Russia, what should our name be?"
 geo.547.a:0 "Union of Soviet Socialist Republics"
 geo.547.b:0 "Our current name suits us the best"
 geo.548.t:0 "Union gets stable"
 geo.548.d:0 "The nation is slowly achieving its goals. The revolution is now here! Stability is apporaching and people start believing in Jughashvili and his benevolent rule."
 geo.548.a:0 "We persist"
 GFX_SPEVNT_RUSSIAN_UNIFICATION_stalin:0 "Jughashvili Unites the Soviet People"
 GFX_SPEVNT_RUSSIAN_UNIFICATION_stalin_TEXT:0 "Everyone imposes his own system as far as his army can reach. \n §Y-Ioseb Jughashvili-§!"
 GFX_SPEVNT_RUSSIAN_UNIFICATION_stalin_REMARK:0 "Trimph of Georgian Bolshevism!"
 GFX_SPEVNT_RUSSIAN_UNIFICATION_stalin_DESC:0 "After the defeat of Bolsheviks in the Civil War, the Red Army regrouped and rebuilt itself in Georgia under the leadership of Ioseb Jughashvili. Although, he holds more nationalistic type of view, Jughashvili is still loyal to the cause of Bolshevism. Now that all outside opponents are elimintated and Russia is unified, his rule is now unchallenged. It remains unclear how will Russia change during his rule, but one is certain - Bolshevik Revolution has prevailed in Russia."
