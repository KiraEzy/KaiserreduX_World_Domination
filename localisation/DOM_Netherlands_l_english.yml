l_english:

holwd.1:0 "Wilhelmina Seizes Control"
holwd.2:0 "Wilhelmina seizes control"
holwd.2.t:0 "Wilhelmina seizes contro"
holwd.2.d:0 "Without a clear winner at the ballot, worried queen Wilhelmina has decided to seize control with the help of the army and install an absolute monarchy"
holwd.2.a:0 "Three Cheers for Wilhelmina"
holwd.3:0 "Belgium Purchased"
holwd.3.t:0 "Belgium Purchased"
holwd.3.d:0 "we were able to buy the Belgian land from its master"
holwd.3.a:0 "United at Last"
holwd.4:0 "Belgium Coup Succesful"
holwd.4.t:0 "Belgium Coup Succesful"
holwd.4.d:0 "the coup in Belgium was succesful"
holwd.4.a:0 "United at Last"
holwd.5:0 "the Boer Question"
holwd.5.t:0 "the Boer Question"
holwd.5.d:0 "for long our brothers have lived in south africa unrecognized by our government, will we recognize them now"
holwd.5.a:0 "we must Unite with them"
holwd.5.b:0 "forget the Boers"
holwd.6:0 "the New York Question"
holwd.6.t:0 "the New York Question"
holwd.6.d:0 "for long our brothers have lived in New York unrecognized by our government, will we recognize them now"
holwd.6.a:0 "we must Unite with them"
holwd.6.b:0 "forget New York"
holwd.7:0 "the Indonesia Question"
holwd.7.t:0 "the Indonesia Question"
holwd.7.d:0 "for long our colony in Indonesia was the jewel of our crown but now it has come time to either integrate or autonomise this jewel"
holwd.7.a:0 "we must Unite with them"
holwd.7.b:0 "Puppet the Indonesians"

