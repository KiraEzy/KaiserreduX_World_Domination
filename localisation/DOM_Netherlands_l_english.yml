HOLWD_Absolutist_Coup:0 "Absolutist Coup"
HOLWD_Absolutist_Coup_desc:0 "Without a clear winner at the ballot, worried Queen Wilhelmina has decided to seize control with the help of the army and install an absolute monarchy"
